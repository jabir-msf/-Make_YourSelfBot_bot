<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Report</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Font Awesome Link to support back button arrow -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f4f7fe; padding: 15px; }
        .hero { background: #1a3fb3; color: white; padding: 25px; border-radius: 15px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .i-card { background: white; padding: 20px; border-radius: 12px; text-align: center; border-bottom: 3px solid #1a3fb3; }
        .i-card h3 { font-size: 12px; color: #666; margin: 0; }
        .i-card p { font-size: 18px; font-weight: bold; margin: 5px 0; }
        
        /* Back Button Style */
        .back-nav {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            cursor: pointer;
            color: #1a3fb3;
            font-size: 16px;
            font-weight: bold;
            text-align: left;
        }
        .back-nav i {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <!-- Back arrow implementation -->
    <div class="back-nav" onclick="history.back()">
        <i class="fa-solid fa-arrow-left"></i> <span>ফিরে যান</span>
    </div>

    <div class="hero"><p>সর্বমোট আয়</p><h1 id="total">৳০.০০</h1></div>
    <div class="grid">
        <div class="i-card"><h3>আজকের আয়</h3><p id="today">৳০.০০</p></div>
        <div class="i-card"><h3>এই সপ্তাহের</h3><p id="week">৳০.০০</p></div>
        <div class="i-card"><h3>এই মাসের</h3><p id="month">৳০.০০</p></div>
        <div class="i-card"><h3>এই বছরের</h3><p id="year">৳০.০০</p></div>
    </div>
    <script>
        async function load() {
            const res = await fetch(`/api/user-income/${window.Telegram.WebApp.initDataUnsafe.user.id}`);
            const d = await res.json();
            document.getElementById('total').innerText = '৳' + d.total;
            document.getElementById('today').innerText = '৳' + d.today;
            document.getElementById('week').innerText = '৳' + d.week;
            document.getElementById('month').innerText = '৳' + d.month;
            document.getElementById('year').innerText = '৳' + d.year;
        }
        load();
    </script>
</body>
</html>
