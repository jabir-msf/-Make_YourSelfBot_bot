
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work History - Make Your Self</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="page6.css"> <!-- page6 এর CSS ব্যবহার করা হয়েছে মিল রাখার জন্য -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="header" style="background: linear-gradient(90deg, #102a71, #1a3fb3);">
            <button class="back-btn" onclick="history.back()">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="header-content">
                <i class="fa-solid fa-list-check header-icon"></i>
                <span class="header-title">কাজের বিবরণ</span>
            </div>
        </header>

        <main class="history-list" id="taskHistoryContainer">
            <div style="text-align: center; color: #777; margin-top: 50px;">
                <i class="fa-solid fa-spinner fa-spin"></i> তথ্য লোড হচ্ছে...
            </div>
        </main>
    </div>
    <script src="page7.js"></script>
</body>
  </html>
