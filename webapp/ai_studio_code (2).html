<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Task - Make Your Self</title>
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="page5.css">
    <!-- Google Fonts for Bengali -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .stats-row {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        .stat-card-mini {
            background: white;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-top: 4px solid #1a3fb3;
        }
        .stat-card-mini.orange { border-top-color: #f39c12; }
        .stat-card-mini p { font-size: 11px; color: #777; margin-bottom: 4px; font-weight: 600; }
        .stat-card-mini h2 { font-size: 18px; color: #333; font-weight: 700; }

        .preview-img { width: 100%; border-radius: 12px; margin-top: 15px; display: none; border: 1px solid #ddd; }
        .loader { display: none; text-align: center; margin-top: 10px; color: #1a3fb3; font-weight: bold; }
        .instruction-box { font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 15px; background: #fff9e6; padding: 12px; border-radius: 10px; border-left: 4px solid #f39c12; }
    </style>
</head>
<body style="background: #f4f7ff;">
    <div class="app-container">
        <!-- Header -->
        <header class="page-header">
            <button class="back-btn" onclick="history.back()">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="header-title">টাস্ক সাবমিট</div>
        </header>

        <main class="content">
            <!-- Limit & Pending Stats (For Ad/Video) -->
            <div id="earningStats" class="stats-row">
                <div class="stat-card-mini">
                    <p>কাজের লিমিট</p>
                    <h2 id="limitDisplay">0/0</h2>
                </div>
                <div class="stat-card-mini orange">
                    <p>পেন্ডিং ব্যালেন্স</p>
                    <h2 id="pendingDisplay">৳০.০০</h2>
                </div>
            </div>

            <!-- Current Task Info -->
            <div class="balance-card">
                <p style="color: rgba(255,255,255,0.7); font-size: 13px;">নির্বাচিত কাজ</p>
                <h3 id="tNameDisplay" style="color: white; margin: 5px 0;">Loading...</h3>
                <h1 id="tAmountDisplay" style="font-size: 32px; color: #ffeb3b;">৳০.০০</h1>
            </div>

            <div class="form-card">
                <!-- ডাইনামিক কাজের রেটিং ও রিভিউর নির্দেশনার গাইড বক্স -->
                <div id="reviewDetailsBox" class="instruction-box" style="display: none; background: #eef2ff; border-left: 4px solid #1a3fb3; color: #1e293b;">
                    <p style="margin-bottom: 8px;"><strong><i class="fa-solid fa-star" style="color: #f1c40f;"></i> <span id="reqLabel">প্রয়োজনীয় রেটিং:</span></strong> <span id="reqRating" style="font-weight: 700; color: #1a3fb3;">N/A</span></p>
                    <p style="margin-bottom: 5px;"><strong><i class="fa-solid fa-pen-to-square" style="color: #3b82f6;"></i> <span id="instLabel">কি লিখতে হবে / নির্দেশনা:</span></strong></p>
                    <div id="reqReviewText" style="background: white; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 13px; line-height: 1.6; word-break: break-all; white-space: pre-line;">N/A</div>
                </div>

                <div class="instruction-box">
                    <i class="fa-solid fa-circle-info"></i> নিচের 'কাজে যান' বাটনে ক্লিক করে কাজ সম্পন্ন করুন। ফিরে এসে প্রমাণস্বরূপ স্ক্রিনশট দিন এবং 'কাজ জমা দিন' বাটনে ক্লিক করুন।
                </div>

                <!-- Screenshot Section -->
                <div id="ssUploadSection" style="margin-bottom: 20px; display: none;">
                    <label style="display: block; font-weight: 600; margin-bottom: 10px; font-size: 14px;">
                        <i class="fa-solid fa-camera"></i> কাজের স্ক্রিনশট দিন (Screenshot):
                    </label>
                    <input type="file" id="screenshotInput" accept="image/*" onchange="previewImg()" style="width: 100%; padding: 10px; background: #f1f4ff; border-radius: 10px;">
                    <img id="imagePreview" class="preview-img">
                </div>

                <!-- Action Buttons -->
                <button class="submit-btn" id="goLinkBtn" style="background: #1a3fb3; margin-bottom: 15px;">
                    <i class="fa-solid fa-up-right-from-square"></i> কাজে যান (Link)
                </button>

                <div id="processingMsg" class="loader">
                    <i class="fa-solid fa-spinner fa-spin"></i> প্রসেসিং...
                </div>

                <button class="submit-btn" id="finalSubmitBtn">
                    <i class="fa-solid fa-circle-check"></i> কাজ জমা দিন
                </button>
            </div>
        </main>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user;
        const params = new URLSearchParams(window.location.search);
        
        const tCat = params.get('cat') || "micro";
        const tName = params.get('name') || "General Task";
        const tAmount = params.get('amount') || "0.00";

        let activeTaskTitle = tName;
        let activeTaskReward = tAmount;
        let taskLink = 'https://t.me/EarnBD_Pro'; 

        document.getElementById('tNameDisplay').innerText = tName;
        document.getElementById('tAmountDisplay').innerText = `৳${tAmount}`;

        async function initPage() {
            if (!user) return;

            // এডমিন প্যানেল থেকে টাস্ক ডাটা, লিংক, রেটিং এবং রিভিউ রিড করা
            try {
                const res = await fetch(`/api/admin-tasks/${user.id}/${tCat}?t=${Date.now()}`);
                const tasks = await res.json();
                
                if (tasks && tasks.length > 0) {
                    activeTaskTitle = tasks[0].title;
                    activeTaskReward = tasks[0].reward.toFixed(2);
                    taskLink = tasks[0].link || 'https://t.me/EarnBD_Pro';
                    
                    document.getElementById('tNameDisplay').innerText = activeTaskTitle;
                    document.getElementById('tAmountDisplay').innerText = `৳${activeTaskReward}`;

                    // ডাইনামিক রিভিউ ও নির্দেশনাবলী কন্টেন্ট লোড করা
                    if (tCat === 'map_review' || tCat === 'app_review' || tCat === 'account_create' || tCat === 'micro') {
                        if (tasks[0].rating || tasks[0].review_text) {
                            document.getElementById('reviewDetailsBox').style.display = 'block';
                            
                            // অ্যাকাউন্ট তৈরি হলে ট্যাগ লেবেল পরিবর্তন
                            if (tCat === 'account_create') {
                                document.getElementById('reqLabel').innerText = "প্রয়োজনীয় ডকুমেন্ট / নাম:";
                                document.getElementById('instLabel').innerText = "কাজের নির্দেশনা:";
                            } else {
                                document.getElementById('reqLabel').innerText = "প্রয়োজনীয় রেটিং:";
                                document.getElementById('instLabel').innerText = "কি লিখতে হবে:";
                            }
                            
                            document.getElementById('reqRating').innerText = tasks[0].rating || "যেকোনো";
                            document.getElementById('reqReviewText').innerText = tasks[0].review_text || "আপনার পছন্দমতো ভালো রিভিউ লিখুন।";
                        }
                    }
                } else {
                    if (tCat === 'ad' || tCat === 'video' || tCat === 'micro' || tCat === 'map_review' || tCat === 'app_review' || tCat === 'account_create') {
                        document.getElementById('tNameDisplay').innerText = "কোনো কাজ অবশিষ্ট নেই!";
                        document.getElementById('tAmountDisplay').innerText = "৳০.০০";
                        document.getElementById('finalSubmitBtn').disabled = true;
                        document.getElementById('finalSubmitBtn').style.background = "#ccc";
                        document.getElementById('finalSubmitBtn').innerText = "কাজ শেষ";
                        document.getElementById('goLinkBtn').disabled = true;
                        document.getElementById('goLinkBtn').style.background = "#ccc";
                    }
                }
            } catch (e) {
                console.error("Dynamic Task Link Fetch Error:", e);
            }

            // সাধারণ ও নতুন যুক্ত করা রিভিউ/একাউন্ট কাজের জন্য প্রথমবার জমার যাচাই লজিক
            if (tCat !== 'ad' && tCat !== 'video') {
                try {
                    const checkRes = await fetch(`/api/tasks/history/${user.id}?t=${Date.now()}`);
                    const history = await checkRes.json();
                    if (history.some(t => t.task_name.trim() === activeTaskTitle.trim())) {
                        tg.showAlert("আপনি ইতিমধ্যে এই কাজটি সম্পন্ন করেছেন!");
                        window.location.replace('micro_tasks.html?cat=' + tCat);
                        return;
                    }
                } catch(e) { console.error(e); }
            }

            // কন্ডিশনাল স্ক্রিনশট উইজেট শো/হাইড লজিক
            if (tCat === 'ad' || tCat === 'video') {
                document.getElementById('earningStats').style.display = 'grid';
                document.getElementById('ssUploadSection').style.display = 'none';
                try {
                    const res = await fetch('/api/earn/limit-check', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ userId: user.id, type: tCat })
                    });
                    const data = await res.json();
                    document.getElementById('limitDisplay').innerText = `${data.count}/${data.limit}`;
                    document.getElementById('pendingDisplay').innerText = `৳${data.pending}`;
                    if (!data.success && data.count >= data.limit) {
                        const btn = document.getElementById('finalSubmitBtn');
                        btn.disabled = true;
                        btn.style.background = "#ccc";
                        btn.innerText = "লিমিট শেষ";
                    }
                } catch(e) { console.error(e); }
            } else {
                document.getElementById('ssUploadSection').style.display = 'block';
                document.getElementById('earningStats').style.display = 'none';
            }
        }

        function previewImg() {
            const file = document.getElementById('screenshotInput').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('imagePreview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }

        // কাজের ডাইনামিক লিংক বাটন হ্যান্ডলার
        document.getElementById('goLinkBtn').onclick = () => tg.openLink(taskLink);

        document.getElementById('finalSubmitBtn').onclick = async () => {
            const btn = document.getElementById('finalSubmitBtn');
            const loader = document.getElementById('processingMsg');
            
            btn.disabled = true;
            loader.style.display = 'block';
            btn.innerText = "যাচাই হচ্ছে...";

            try {
                if (tCat === 'ad' || tCat === 'video') {
                    const checkRes = await fetch('/api/earn/limit-check', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ userId: user.id, type: tCat })
                    });
                    const checkData = await checkRes.json();
                    if (!checkData.success) {
                        tg.showAlert(checkData.message);
                        location.reload();
                        return;
                    }
                }

                btn.innerText = "জমা হচ্ছে...";
                let proofUrl = "Auto Submit (No SS Required)";

                if (tCat !== 'ad' && tCat !== 'video') {
                    const fileInput = document.getElementById('screenshotInput');
                    if (fileInput.files.length === 0) {
                        loader.style.display = 'none';
                        btn.disabled = false;
                        btn.innerText = "কাজ জমা দিন";
                        return tg.showAlert("অনুগ্রহ করে একটি স্ক্রিনশট দিন!");
                    }

                    const formData = new FormData();
                    formData.append("image", fileInput.files[0]);
                    const imgRes = await fetch("https://api.imgbb.com/1/upload?key=7246bc1a891878821a0140bd7686bdf9", {
                        method: "POST",
                        body: formData
                    });
                    const imgData = await imgRes.json();
                    if(!imgData.success) throw new Error("Image Upload Failed");
                    proofUrl = imgData.data.url;
                }

                // ডাটাবেসে টাস্ক সেভ
                const res = await fetch('/api/tasks/submit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userId: user.id,
                        taskName: activeTaskTitle.trim(), 
                        amount: activeTaskReward,
                        category: tCat,
                        proofUrl: proofUrl
                    })
                });

                if (tCat === 'ad' || tCat === 'video') {
                    await fetch('/api/earn/increment', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ userId: user.id, type: tCat })
                    });
                }

                const result = await res.json();
                tg.showAlert(result.message);
                
                if (result.success) {
                    if (tCat === 'ad' || tCat === 'video') {
                        location.reload();
                    } else {
                        if (tCat === 'micro' || tCat === 'map_review' || tCat === 'app_review' || tCat === 'account_create') {
                            window.location.replace(`micro_tasks.html?cat=${tCat}`); 
                        } else if (tCat.includes('sell')) {
                            window.location.replace(`sell_tasks.html?cat=${tCat}`);
                        } else {
                            window.location.replace('page3dashboard.html');
                        }
                    }
                } else {
                    btn.disabled = false;
                    loader.style.display = 'none';
                    btn.innerText = "কাজ জমা দিন";
                }

            } catch (err) {
                console.error(err);
                tg.showAlert("আবার চেষ্টা করুন।");
                btn.disabled = false;
                loader.style.display = 'none';
                btn.innerText = "কাজ জমা দিন";
            }
        };

        initPage();
    </script>
</body>
</html>
