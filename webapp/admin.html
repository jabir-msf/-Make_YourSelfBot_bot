<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Make Your Self</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
        header { background: #1a3fb3; color: white; padding: 20px; text-align: center; }
        .tabs { display: flex; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: #555; font-size: 13px; }
        .tab-btn.active { color: #1a3fb3; border-bottom: 3px solid #1a3fb3; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card h4 { margin: 0 0 10px 0; color: #333; }
        .card p { margin: 5px 0; font-size: 14px; color: #666; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-approve { background: #2ecc71; color: white; }
        .btn-reject { background: #e74c3c; color: white; }
        .proof-img { width: 100%; max-height: 200px; object-fit: contain; margin-top: 10px; border-radius: 5px; background: #eee; cursor: pointer; }
        #auth-msg { text-align: center; margin-top: 100px; color: red; font-weight: bold; }

        /* Form Styling for Manage Tab */
        .admin-input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .manage-title { font-size: 18px; font-weight: bold; color: #1a3fb3; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>
    <div id="admin-content" style="display: none;">
        <header>
            <h2>অ্যাডমিন কন্ট্রোল প্যানেল</h2>
        </header>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tasks', this)">পেন্ডিং টাস্ক</button>
            <button class="tab-btn" onclick="switchTab('withdraws', this)">উইথড্র</button>
            <button class="tab-btn" onclick="switchTab('manage', this)">কাজ যোগ করুন</button>
        </div>
        
        <div class="container">
            <!-- List View (Tasks & Withdrawals) -->
            <div id="list-container">
                <!-- ডাটা এখানে লোড হবে -->
            </div>

            <!-- Management View (Add New Tasks) -->
            <div id="manage-section" style="display: none;">
                <div class="card">
                    <span class="manage-title"><i class="fa-solid fa-plus-circle"></i> নতুন কাজ পাবলিশ করুন</span>
                    
                    <label style="font-size: 12px; font-weight: bold; color: #555;">কাজের নাম</label>
                    <input type="text" id="taskTitle" placeholder="যেমন: Subscribe our channel" class="admin-input">
                    
                    <label style="font-size: 12px; font-weight: bold; color: #555;">পারিশ্রমিক (৳)</label>
                    <input type="number" id="taskReward" placeholder="যেমন: 5.00" class="admin-input">
                    
                    <label style="font-size: 12px; font-weight: bold; color: #555;">ক্যাটাগরি</label>
                    <select id="taskCategory" class="admin-input">
                        <option value="micro">Micro Task (Admin)</option>
                        <option value="gmail_sell">Gmail Sell</option>
                        <option value="fb_sell">Facebook Sell</option>
                        <option value="insta_sell">Instagram Sell</option>
                        <option value="tiktok_sell">Tiktok Sell</option>
                    </select>
                    
                    <label style="font-size: 12px; font-weight: bold; color: #555;">ডেইলি পাসওয়ার্ড (Selling Tasks এর জন্য)</label>
                    <input type="text" id="taskPass" placeholder="Password (ঐচ্ছিক)" class="admin-input">
                    
                    <button class="btn btn-approve" onclick="addNewTask()" style="width: 100%; margin-top: 10px;">
                        <i class="fa-solid fa-cloud-upload"></i> কাজটি সেভ করুন
                    </button>
                </div>
            </div>
        </div>
    </div>
    <div id="auth-msg">যাচাই করা হচ্ছে...</div>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user;
        const ADMIN_ID = 8144639897; 

        if (user && user.id === ADMIN_ID) {
            document.getElementById('admin-content').style.display = 'block';
            document.getElementById('auth-msg').style.display = 'none';
            loadPendingTasks();
        } else {
            document.getElementById('auth-msg').innerText = "অ্যাক্সেস রিফিউজড! আপনি অ্যাডমিন নন।";
        }

        async function switchTab(type, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const listContainer = document.getElementById('list-container');
            const manageSection = document.getElementById('manage-section');

            if(type === 'manage') {
                listContainer.style.display = 'none';
                manageSection.style.display = 'block';
            } else {
                listContainer.style.display = 'block';
                manageSection.style.display = 'none';
                if(type === 'tasks') loadPendingTasks();
                else loadPendingWithdrawals();
            }
        }

        async function loadPendingTasks() {
            const container = document.getElementById('list-container');
            container.innerHTML = "<p style='text-align:center;'><i class='fa-solid fa-spinner fa-spin'></i> লোডিং...</p>";
            try {
                const res = await fetch('/api/admin/pending-tasks');
                const tasks = await res.json();
                container.innerHTML = tasks.length ? '' : '<p style="text-align:center; color:#999;">কোন পেন্ডিং কাজ নেই।</p>';
                
                tasks.forEach(t => {
                    container.innerHTML += `
                    <div class="card">
                        <h4>${t.task_name}</h4>
                        <p><strong>ইউজার:</strong> ${t.profiles?.username || t.user_id}</p>
                        <p><strong>টাকা:</strong> ৳${t.amount}</p>
                        <p><strong>প্রুফ:</strong> ${t.proof_url.startsWith('http') ? `<img src="${t.proof_url}" class="proof-img" onclick="window.open('${t.proof_url}')">` : t.proof_url}</p>
                        <div class="btn-group">
                            <button class="btn btn-approve" onclick="actionTask('${t.id}', '${t.user_id}', ${t.amount}, 'approve')">Approve</button>
                            <button class="btn btn-reject" onclick="actionTask('${t.id}', '${t.user_id}', 0, 'reject')">Reject</button>
                        </div>
                    </div>`;
                });
            } catch(e) { container.innerHTML = "Error loading tasks."; }
        }

        async function actionTask(taskId, userId, amount, type) {
            const endpoint = type === 'approve' ? '/api/admin/approve-task' : '/api/admin/reject-task';
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ taskId, userId, amount })
            });
            const result = await res.json();
            if(result.success) loadPendingTasks();
            else alert("Error occurred!");
        }

        async function loadPendingWithdrawals() {
            const container = document.getElementById('list-container');
            container.innerHTML = "<p style='text-align:center;'><i class='fa-solid fa-spinner fa-spin'></i> লোডিং...</p>";
            try {
                const res = await fetch('/api/admin/pending-withdrawals');
                const withdraws = await res.json();
                container.innerHTML = withdraws.length ? '' : '<p style="text-align:center; color:#999;">কোন উইথড্র রিকোয়েস্ট নেই।</p>';

                withdraws.forEach(w => {
                    container.innerHTML += `
                    <div class="card">
                        <h4>উইথড্র রিকোয়েস্ট (${w.profiles?.username || w.user_id})</h4>
                        <p><strong>পদ্ধতি:</strong> ${w.method.toUpperCase()}</p>
                        <p><strong>নম্বর:</strong> ${w.account_no}</p>
                        <p><strong>পরিমাণ:</strong> ৳${w.amount}</p>
                        <div class="btn-group">
                            <button class="btn btn-approve" onclick="actionWithdraw('${w.id}', 'approve', '${w.user_id}', ${w.amount})">Paid (Approve)</button>
                            <button class="btn btn-reject" onclick="actionWithdraw('${w.id}', 'reject', '${w.user_id}', ${w.amount})">Cancel (Refund)</button>
                        </div>
                    </div>`;
                });
            } catch(e) { container.innerHTML = "Error loading withdrawals."; }
        }

        async function actionWithdraw(id, type, userId, amount) {
            const res = await fetch('/api/admin/action-withdraw', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, type, userId, amount })
            });
            loadPendingWithdrawals();
        }

        // Add New Admin Task Logic
        async function addNewTask() {
            const title = document.getElementById('taskTitle').value;
            const reward = document.getElementById('taskReward').value;
            const category = document.getElementById('taskCategory').value;
            const pass = document.getElementById('taskPass').value;

            if(!title || !reward) return alert("শিরোনাম এবং রিওয়ার্ড অবশ্যই দিতে হবে!");

            try {
                const res = await fetch('/api/admin/add-task', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ title, reward, category, pass })
                });
                const result = await res.json();
                if(result.success) {
                    alert("কাজটি সফলভাবে যোগ করা হয়েছে!");
                    document.getElementById('taskTitle').value = "";
                    document.getElementById('taskReward').value = "";
                    document.getElementById('taskPass').value = "";
                } else {
                    alert("ব্যর্থ হয়েছে!");
                }
            } catch(e) { alert("সার্ভার ত্রুটি!"); }
        }
    </script>
</body>
                                                   </html>
