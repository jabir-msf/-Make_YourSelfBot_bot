<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Make Your Self</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0d1b4d; --secondary: #1a3fb3; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --light: #f8faff; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 0; color: #333; }
        
        header { background: var(--primary); color: white; padding: 20px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        
        .tabs { display: flex; background: white; overflow-x: auto; white-space: nowrap; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-btn { flex: 1; padding: 15px 10px; border: none; background: none; cursor: pointer; font-weight: bold; color: #666; font-size: 12px; transition: 0.3s; min-width: 80px; }
        .tab-btn.active { color: var(--secondary); border-bottom: 3px solid var(--secondary); background: var(--light); }
        
        .container { padding: 15px; max-width: 700px; margin: auto; padding-bottom: 50px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: white; padding: 15px; border-radius: 10px; text-align: center; border-bottom: 4px solid var(--secondary); }
        .stat-box h2 { margin: 5px 0; color: var(--primary); font-size: 20px; }
        .stat-box p { margin: 0; font-size: 11px; color: #777; font-weight: bold; text-transform: uppercase; }

        /* General UI */
        .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .btn-blue { background: var(--secondary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-red { background: var(--danger); color: white; }
        .btn-orange { background: var(--warning); color: white; }

        .proof-img { width: 100%; max-height: 250px; object-fit: contain; border-radius: 8px; margin-top: 10px; background: #fafafa; }
        
        /* Search Box */
        .search-row { display: flex; gap: 5px; margin-bottom: 15px; }
        .search-row input { flex: 1; margin-bottom: 0; }
        .search-row button { width: 60px; margin-bottom: 0; }

        #auth-msg { text-align: center; padding: 100px 20px; }
    </style>
</head>
<body>

    <div id="auth-msg">
        <div class="card">
            <i class="fa-solid fa-shield-halved" style="font-size: 50px; color: var(--danger);"></i>
            <h2 id="status-text">Security Check...</h2>
            <p id="status-desc">Please open from Telegram App.</p>
        </div>
    </div>

    <div id="admin-content" style="display: none;">
        <header>
            <h2 style="margin: 0; font-size: 18px;">EarnBD Control Center</h2>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('stats', this)">Stats</button>
            <button class="tab-btn" onclick="switchTab('deposits', this)">Add Money</button>
            <button class="tab-btn" onclick="switchTab('tasks', this)">Tasks</button>
            <button class="tab-btn" onclick="switchTab('withdraws', this)">Paid/Recharge</button>
            <button class="tab-btn" onclick="switchTab('users', this)">Users</button>
            <button class="tab-btn" onclick="switchTab('config', this)">Settings</button>
        </div>

        <div class="container">
            
            <!-- 1. Statistics Tab -->
            <div id="tab-stats">
                <div class="stats-grid">
                    <div class="stat-box">
                        <p>Total Users</p>
                        <h2 id="stat-users">0</h2>
                    </div>
                    <div class="stat-box">
                        <p>Total Balance</p>
                        <h2 id="stat-balance">৳0</h2>
                    </div>
                    <div class="stat-box">
                        <p>Pending Add Money</p>
                        <h2 id="stat-deposits">0</h2>
                    </div>
                    <div class="stat-box">
                        <p>Pending Withdraw/Recharge</p>
                        <h2 id="stat-withdraw">0</h2>
                    </div>
                </div>
                <button class="btn btn-blue" onclick="loadStats()"><i class="fa-solid fa-rotate"></i> Refresh Stats</button>
            </div>

            <!-- 2. Deposits (Add Money) Tab -->
            <div id="tab-deposits" style="display: none;">
                <div id="deposits-list"></div>
            </div>

            <!-- 3. Common List View (Tasks & Withdrawals/Recharge) -->
            <div id="tab-list" style="display: none;"></div>

            <!-- 4. User Management Tab -->
            <div id="tab-users" style="display: none;">
                <div class="search-row">
                    <input type="text" id="userSearchInput" class="admin-input" placeholder="User ID or Username">
                    <button class="btn btn-blue" onclick="searchUser()"><i class="fa-solid fa-search"></i></button>
                </div>
                <div id="search-result"></div>
            </div>

            <!-- 5. Global Settings Tab -->
            <div id="tab-config" style="display: none;">
                <div class="card">
                    <h4>Global Configuration</h4>
                    <label style="font-size: 11px;">Min Withdraw (৳)</label>
                    <input type="number" id="cfg-min" class="admin-input" placeholder="100">
                    
                    <label style="font-size: 11px;">Ref Bonus (৳)</label>
                    <input type="number" id="cfg-ref" class="admin-input" placeholder="20">
                    
                    <label style="font-size: 11px;">App Notice</label>
                    <textarea id="cfg-notice" class="admin-input" style="height: 80px;"></textarea>
                    
                    <button class="btn btn-green" onclick="saveSettings()">Update Settings</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe.user;
        const ADMIN_ID = 8144639897; 

        function checkAccess() {
            if (user && user.id === ADMIN_ID) {
                document.getElementById('admin-content').style.display = 'block';
                document.getElementById('auth-msg').style.display = 'none';
                loadStats();
            } else {
                document.getElementById('status-text').innerText = "Denied!";
                document.getElementById('status-desc').innerText = user ? "You are not admin." : "Open in Telegram.";
            }
        }

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            ['tab-stats', 'tab-list', 'tab-users', 'tab-config', 'tab-deposits'].forEach(id => {
                document.getElementById(id).style.display = 'none';
            });

            if(tab === 'stats') {
                document.getElementById('tab-stats').style.display = 'block';
                loadStats();
            } else if(tab === 'deposits') {
                document.getElementById('tab-deposits').style.display = 'block';
                loadPendingDeposits();
            } else if(tab === 'tasks') {
                document.getElementById('tab-list').style.display = 'block';
                loadPendingTasks();
            } else if(tab === 'withdraws') {
                document.getElementById('tab-list').style.display = 'block';
                loadPendingWithdrawals();
            } else if(tab === 'users') {
                document.getElementById('tab-users').style.display = 'block';
            } else if(tab === 'config') {
                document.getElementById('tab-config').style.display = 'block';
                loadSettings();
            }
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/admin/stats');
                const data = await res.json();
                document.getElementById('stat-users').innerText = data.totalUsers;
                document.getElementById('stat-balance').innerText = '৳' + data.totalBalance.toFixed(0);
                
                // Add money রিকোয়েস্ট সংখ্যা এখানে বসবে (সার্ভার থেকে আনতে হবে)
                const depRes = await fetch('/api/admin/pending-deposits');
                const deps = await depRes.json();
                document.getElementById('stat-deposits').innerText = deps.length;
                
                document.getElementById('stat-withdraw').innerText = data.pendingWithdrawals;
            } catch(e) { console.error(e); }
        }

        async function loadPendingDeposits() {
            const container = document.getElementById('deposits-list');
            container.innerHTML = "<p style='text-align:center;'>Loading Add Money Requests...</p>";
            const res = await fetch('/api/admin/pending-deposits');
            const data = await res.json();
            container.innerHTML = data.length ? '' : '<div class="card" style="text-align:center;">No Pending Deposits</div>';
            data.forEach(d => {
                container.innerHTML += `<div class="card">
                    <h4>Add Money: ${d.method}</h4>
                    <p>User ID: ${d.user_id}</p>
                    <p>Amount: <b>৳${d.amount}</b></p>
                    <p style="color:var(--secondary)">TrxID: <b>${d.transaction_id}</b></p>
                    <div style="display:flex; gap:5px;">
                        <button class="btn btn-green" onclick="actionDeposit('${d.id}', '${d.user_id}', ${d.amount}, 'approve')">Approve</button>
                        <button class="btn btn-red" onclick="actionDeposit('${d.id}', '${d.user_id}', 0, 'reject')">Reject</button>
                    </div>
                </div>`;
            });
        }

        async function actionDeposit(id, userId, amount, type) {
            const endpoint = type === 'approve' ? '/api/admin/approve-deposit' : '/api/admin/reject-deposit';
            await fetch(endpoint, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, userId, amount })
            });
            loadPendingDeposits();
        }

        async function loadPendingTasks() {
            const container = document.getElementById('tab-list');
            container.innerHTML = "<p style='text-align:center;'>Loading Tasks...</p>";
            const res = await fetch('/api/admin/pending-tasks');
            const tasks = await res.json();
            container.innerHTML = tasks.length ? '' : '<div class="card" style="text-align:center;">No Tasks</div>';
            tasks.forEach(t => {
                const proof = t.proof_url?.startsWith('http') ? `<img src="${t.proof_url}" class="proof-img" onclick="window.open('${t.proof_url}')">` : `<b>${t.proof_url}</b>`;
                container.innerHTML += `<div class="card">
                    <h4>${t.task_name}</h4>
                    <p>User: ${t.profiles?.username || t.user_id}</p>
                    <p>Reward: ৳${t.amount}</p>
                    <p>Proof: ${proof}</p>
                    <div style="display:flex; gap:5px;">
                        <button class="btn btn-green" onclick="actionTask('${t.id}', '${t.user_id}', ${t.amount}, 'approve')">Approve</button>
                        <button class="btn btn-red" onclick="actionTask('${t.id}', '${t.user_id}', 0, 'reject')">Reject</button>
                    </div>
                </div>`;
            });
        }

        async function loadPendingWithdrawals() {
            const container = document.getElementById('tab-list');
            container.innerHTML = "<p style='text-align:center;'>Loading Withdrawals/Recharge...</p>";
            const res = await fetch('/api/admin/pending-withdrawals');
            const data = await res.json();
            container.innerHTML = data.length ? '' : '<div class="card" style="text-align:center;">No Pending Requests</div>';
            data.forEach(w => {
                container.innerHTML += `<div class="card">
                    <h4>Request: ${w.method.toUpperCase()}</h4>
                    <p>User ID: ${w.user_id}</p>
                    <p>Number: <b>${w.account_no}</b></p>
                    <p>Amount: <b>৳${w.amount}</b></p>
                    <div style="display:flex; gap:5px;">
                        <button class="btn btn-green" onclick="actionWithdraw('${w.id}', 'approve', '${w.user_id}', ${w.amount})">Complete/Paid</button>
                        <button class="btn btn-red" onclick="actionWithdraw('${w.id}', 'reject', '${w.user_id}', ${w.amount})">Refund</button>
                    </div>
                </div>`;
            });
        }

        async function searchUser() {
            const query = document.getElementById('userSearchInput').value;
            const res = await fetch(`/api/admin/user-search/${query}`);
            const users = await res.json();
            const container = document.getElementById('search-result');
            container.innerHTML = users.length ? '' : '<p>No user found.</p>';
            users.forEach(u => {
                const banBtnText = u.is_banned ? "Unban User" : "Ban User";
                const banBtnClass = u.is_banned ? "btn-green" : "btn-red";
                container.innerHTML += `<div class="card">
                    <h4>${u.username} (ID: ${u.id})</h4>
                    <p>Balance: <b>৳${u.balance}</b></p>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <button class="btn btn-blue" onclick="editBalance('${u.id}', ${u.balance})">Balance</button>
                        <button class="btn ${banBtnClass}" onclick="toggleBan('${u.id}', ${u.is_banned})">${banBtnText}</button>
                    </div>
                </div>`;
            });
        }

        async function toggleBan(userId, currentStatus) {
            if(!confirm(`Are you sure?`)) return;
            const res = await fetch('/api/admin/ban-user', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId, status: !currentStatus })
            });
            searchUser();
        }

        async function editBalance(id, old) {
            const amount = prompt("New Balance?", old);
            if(amount === null) return;
            await fetch('/api/admin/update-balance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: id, amount })
            });
            searchUser();
        }

        async function loadSettings() {
            const res = await fetch('/api/admin/get-settings');
            const data = await res.json();
            document.getElementById('cfg-min').value = data.min_withdraw || 100;
            document.getElementById('cfg-ref').value = data.ref_bonus || 20;
            document.getElementById('cfg-notice').value = data.app_notice || "";
        }

        async function saveSettings() {
            const res = await fetch('/api/admin/update-settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    min: document.getElementById('cfg-min').value,
                    ref: document.getElementById('cfg-ref').value,
                    notice: document.getElementById('cfg-notice').value
                })
            });
            alert("Settings Saved!");
        }

        async function actionTask(taskId, userId, amount, type) {
            await fetch(type === 'approve' ? '/api/admin/approve-task' : '/api/admin/reject-task', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ taskId, userId, amount })
            });
            loadPendingTasks();
        }

        async function actionWithdraw(id, type, userId, amount) {
            await fetch('/api/admin/action-withdraw', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, type, userId, amount })
            });
            loadPendingWithdrawals();
        }

        checkAccess();
    </script>
</body>
                            </html>
