<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Your Self - Services</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="page3dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-shell">
        <div class="header-region">
            <nav class="nav-bar">
                <i class="fa-solid fa-arrow-left menu-icon" onclick="history.back()" style="cursor: pointer;"></i>
                <h2 class="logo-text">Make Your Self</h2>
                <div class="nav-right">
                    <div class="balance-pill">
                        <span class="p-label">ব্যালেন্স</span>
                        <span class="p-amount" id="servicePageBalance">৳০.০০</span>
                    </div>
                </div>
            </nav>

            <div class="quick-contact" style="grid-template-columns: repeat(3, 1fr);">
                <div class="q-card" onclick="window.Telegram.WebApp.openTelegramLink('https://t.me/EarnBD_Pro')" style="cursor: pointer;">পেমেন্ট প্রুফ</div>
                <div class="q-card" onclick="window.location.href='page6.html'" style="cursor: pointer;">উত্তোলন ইতিহাস</div>
                <div class="q-card" onclick="window.location.href='page7.html'" style="cursor: pointer;">কাজের বিবরণ</div>
            </div>
        </div>

        <main class="main-body">
            <div class="section-head">
                <span class="bar-orange"></span>
                <h3>আমাদের সেবাসমূহ</h3>
            </div>

            <div class="services-grid">
                <!-- Row 1: Active Tasks -->
                <div class="service-item" onclick="startTask('ভিডিও ইনকাম', '5.00')">
                    <span class="tag-hot">HOT</span>
                    <div class="icon-bg"><i class="fa-solid fa-tv" style="color: #4a90e2;"></i></div>
                    <p>ভিডিও ইনকাম</p>
                </div>
                <div class="service-item" onclick="startTask('কুইজ ইনকাম', '2.00')">
                    <div class="icon-bg"><i class="fa-solid fa-brain" style="color: #ff6b6b;"></i></div>
                    <p>কুইজ ইনকাম</p>
                </div>
                <div class="service-item" onclick="comingSoon()">
                    <div class="icon-bg"><i class="fa-solid fa-keyboard" style="color: #34495e;"></i></div>
                    <p>টাইপিং জব</p>
                </div>
                <div class="service-item" onclick="startTask('মাইক্রো টাস্ক', '3.50')">
                    <div class="icon-bg"><i class="fa-solid fa-bullseye" style="color: #e74c3c;"></i></div>
                    <p>মাইক্রো টাস্ক</p>
                </div>

                <!-- Row 2 -->
                <div class="service-item" onclick="startTask('অ্যাড আর্নিং', '1.50')">
                    <span class="tag-new">NEW</span>
                    <div class="icon-bg"><i class="fa-solid fa-sack-dollar" style="color: #f1c40f;"></i></div>
                    <p>অ্যাড আর্নিং</p>
                </div>
                <div class="service-item" onclick="comingSoon()">
                    <div class="icon-bg"><i class="fa-solid fa-mobile-screen-button" style="color: #2c3e50;"></i></div>
                    <p>মোবাইল রিচার্জ</p>
                </div>
                <div class="service-item" onclick="comingSoon()">
                    <div class="icon-bg"><i class="fa-solid fa-briefcase" style="color: #8d6e63;"></i></div>
                    <p>জব পোস্ট</p>
                </div>
                <div class="service-item" onclick="comingSoon()">
                    <div class="icon-bg"><i class="fa-solid fa-cart-shopping" style="color: #90a4ae;"></i></div>
                    <p>রেসেলিং</p>
                </div>

                <!-- Others (Keeping same structure) -->
                <div class="service-item" onclick="comingSoon()">
                    <div class="icon-bg"><i class="fa-solid fa-money-bill-1-wave" style="color: #2ecc71;"></i></div>
                    <p>মাসিক বেতন</p>
                </div>
                <div class="service-item" onclick="startTask('ম্যাপ রিভিউ', '10.00')">
                    <span class="tag-hot">HOT</span>
                    <div class="icon-bg"><i class="fa-solid fa-location-dot" style="color: #ea4335;"></i></div>
                    <p>Map Review</p>
                </div>
                <!-- ... বাকি বাটনগুলো একই থাকবে ... -->
            </div>
        </main>
    </div>

    <script src="page3dashboard.js"></script>
</body>
    </html>
