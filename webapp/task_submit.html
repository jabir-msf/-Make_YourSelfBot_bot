<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Proof - Make Your Self</title>
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="page5.css">
    <!-- Google Fonts for Bengali -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .preview-img { width: 100%; border-radius: 12px; margin-top: 15px; display: none; border: 2px solid #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .upload-status { display: none; text-align: center; margin-top: 15px; color: #1a3fb3; font-weight: 700; background: #eef2ff; padding: 10px; border-radius: 8px; }
        .info-box { background: #fff9db; border-left: 4px solid #fcc419; padding: 10px; margin-bottom: 15px; font-size: 13px; color: #666; }
    </style>
</head>
<body style="background: #f4f7ff;">
    <div class="app-container">
        <!-- Header -->
        <header class="page-header">
            <button class="back-btn" onclick="history.back()">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="header-title">প্রমাণ জমা দিন</div>
        </header>

        <main class="content">
            <!-- Task Info Card -->
            <div class="balance-card">
                <p style="color: rgba(255,255,255,0.8); font-size: 14px;">আপনার নির্বাচিত টাস্ক</p>
                <h3 id="tNameDisplay" style="color: white; margin: 5px 0;">Loading...</h3>
                <h1 id="tAmountDisplay" style="font-size: 36px; color: #ffeb3b;">৳০.০০</h1>
            </div>

            <div class="form-card">
                <div class="info-box">
                    <i class="fa-solid fa-circle-info"></i> কাজ শেষ করার পর স্ক্রিনশট এখানে আপলোড করুন। অ্যাডমিন আপনার কাজের প্রমাণ চেক করে ব্যালেন্সে টাকা যোগ করে দিবে।
                </div>

                <div class="input-group">
                    <label><i class="fa-solid fa-image"></i> স্ক্রিনশট ফাইল সিলেক্ট করুন</label>
                    <input type="file" id="screenshotInput" accept="image/*" onchange="previewImage()" style="padding: 12px; background: #f1f4ff; border-radius: 10px; width: 100%; cursor: pointer; border: 1px dashed #1a3fb3;">
                    <img id="imagePreview" class="preview-img" alt="Screenshot Preview">
                </div>

                <!-- Status Message -->
                <div id="statusMsg" class="upload-status">
                    <i class="fa-solid fa-spinner fa-spin"></i> প্রসেসিং... একটু অপেক্ষা করুন।
                </div>

                <!-- Action Button -->
                <button class="submit-btn" id="finalSubmitBtn" style="margin-top: 20px; background: #0d1b4d; box-shadow: 0 4px 15px rgba(13, 27, 77, 0.3);">
                    <i class="fa-solid fa-paper-plane"></i> কাজ জমা দিন
                </button>
            </div>
        </main>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user;
        
        // URL থেকে ডাটা নেয়া
        const params = new URLSearchParams(window.location.search);
        const tName = params.get('name') || "General Task";
        const tAmount = params.get('amount') || "0.00";
        const tCat = params.get('cat') || "micro";
        const tType = params.get('type') || "general"; // 'ad' or 'video' if applicable

        // UI আপডেট
        document.getElementById('tNameDisplay').innerText = tName;
        document.getElementById('tAmountDisplay').innerText = `৳${tAmount}`;

        // ইমেজ প্রিভিউ লজিক
        function previewImage() {
            const file = document.getElementById('screenshotInput').files[0];
            const img = document.getElementById('imagePreview');
            const status = document.getElementById('statusMsg');
            
            if (file) {
                // ফাইল সাইজ চেক (৫ এমবির বেশি হলে বাধা দিবে)
                if (file.size > 5 * 1024 * 1024) {
                    tg.showAlert("ফাইলটি অনেক বড়! দয়া করে ৫ এমবির নিচের ফাইল দিন।");
                    document.getElementById('screenshotInput').value = "";
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    img.src = e.target.result;
                    img.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }

        // মেইন সাবমিট বাটন লজিক
        document.getElementById('finalSubmitBtn').onclick = async () => {
            const fileInput = document.getElementById('screenshotInput');
            
            // ভ্যালিডেশন
            if (!user) return tg.showAlert("টেলিগ্রাম ইউজার ডাটা পাওয়া যায়নি!");
            if (fileInput.files.length === 0) return tg.showAlert("অনুগ্রহ করে কাজের একটি স্ক্রিনশট দিন!");

            const btn = document.getElementById('finalSubmitBtn');
            const status = document.getElementById('statusMsg');

            // UI লক করা
            btn.disabled = true;
            status.style.display = 'block';
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> আপলোড হচ্ছে...';

            try {
                // ১. ImgBB তে ইমেজ আপলোড করা
                const formData = new FormData();
                formData.append("image", fileInput.files[0]);

                // নোট: আপনার ImgBB API Key ব্যবহার করা হয়েছে
                const imgRes = await fetch("https://api.imgbb.com/1/upload?key=7246bc1a891878821a0140bd7686bdf9", {
                    method: "POST",
                    body: formData
                    // FormData পাঠালে আলাদাভাবে Headers দেয়া লাগে না, ব্রাউজার নিজে সেট করে নেয়।
                });
                
                const imgData = await imgRes.json();
                
                if (!imgData.success) {
                    console.error("ImgBB Error:", imgData);
                    throw new Error("ইমেজ আপলোড ব্যর্থ হয়েছে!");
                }
                
                const proofUrl = imgData.data.url; // ইমেজের লাইভ লিঙ্ক

                // ২. সার্ভার API-তে ডাটা পাঠানো
                const res = await fetch('/api/tasks/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: user.id,
                        taskName: tName,
                        amount: tAmount,
                        category: tCat,
                        proofUrl: proofUrl // ImgBB লিঙ্কটি এখানে পাঠানো হচ্ছে
                    })
                });
                
                const result = await res.json();
                
                if (result.success) {
                    tg.showAlert("অভিনন্দন! আপনার কাজটি জমা হয়েছে। এডমিন চেক করার পর টাকা ব্যালেন্সে যোগ হবে।");
                    window.location.href = 'page7.html'; // ইতিহাস পেজে নিয়ে যাবে
                } else {
                    throw new Error(result.message || "সাবমিট করতে সমস্যা হয়েছে।");
                }

            } catch (err) {
                console.error("Critical Submission Error:", err);
                tg.showAlert("দুঃখিত! " + err.message);
                
                // UI আনলক করা
                btn.disabled = false;
                status.style.display = 'none';
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> কাজ জমা দিন';
            }
        };

        // টেলিগ্রাম সেটিংস
        tg.expand();
        tg.enableClosingConfirmation();
    </script>
</body>
</html>
