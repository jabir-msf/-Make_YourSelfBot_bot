<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Task - Make Your Self</title>
    
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="page5.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* নতুন কার্ড দুটির ডিজাইন */
        .stats-row {
            display: none; /* ডিফল্টভাবে হাইড থাকবে */
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        .stat-card-mini {
            background: white;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-top: 4px solid #1a3fb3;
        }
        .stat-card-mini.orange { border-top-color: #f39c12; }
        .stat-card-mini p { font-size: 11px; color: #777; margin-bottom: 4px; font-weight: 600; }
        .stat-card-mini h2 { font-size: 18px; color: #333; font-weight: 700; }

        .preview-img { width: 100%; border-radius: 12px; margin-top: 15px; display: none; border: 1px solid #ddd; }
        .loader { display: none; text-align: center; margin-top: 10px; color: #1a3fb3; font-weight: bold; }
        .instruction-text { font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 15px; background: #fff9e6; padding: 10px; border-radius: 10px; border-left: 4px solid #f39c12; }
    </style>
</head>
<body style="background: #f4f7ff;">
    <div class="app-container">
        <header class="page-header">
            <button class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="header-title" id="pageTitle">কাজ জমা দিন</div>
        </header>

        <main class="content">
            <!-- কাজের লিমিট এবং পেন্ডিং ব্যালেন্স কার্ড (ভিডিও ও অ্যাডের জন্য) -->
            <div id="earningStats" class="stats-row">
                <div class="stat-card-mini">
                    <p>কাজের লিমিট</p>
                    <h2 id="limitDisplay">0/0</h2>
                </div>
                <div class="stat-card-mini orange">
                    <p>পেন্ডিং ব্যালেন্স</p>
                    <h2 id="pendingDisplay">৳০.০০</h2>
                </div>
            </div>

            <div class="balance-card">
                <p style="color: rgba(255,255,255,0.8); font-size: 13px;">নির্বাচিত কাজ</p>
                <h3 id="tNameDisplay" style="color: white; margin: 5px 0;">Loading...</h3>
                <h1 id="tAmountDisplay" style="font-size: 32px; color: #ffeb3b;">৳০.০০</h1>
            </div>

            <div class="form-card">
                <div class="instruction-text" id="instructions">
                    নির্দেশনা: নিচের বাটনে ক্লিক করে কাজটি সম্পূর্ণ করুন এবং ফিরে এসে জমা দিন।
                </div>

                <!-- মাইক্রো টাস্কের জন্য স্ক্রিনশট সেকশন -->
                <div id="ssUploadSection" style="margin-bottom: 20px; display: none;">
                    <label style="display: block; font-weight: 600; margin-bottom: 10px; font-size: 14px;">
                        <i class="fa-solid fa-camera"></i> কাজের স্ক্রিনশট দিন:
                    </label>
                    <input type="file" id="screenshotInput" accept="image/*" onchange="previewImg()" style="width: 100%; padding: 10px; background: #f1f4ff; border-radius: 10px;">
                    <img id="imagePreview" class="preview-img">
                </div>

                <button class="submit-btn" id="goLinkBtn" style="background: #1a3fb3; margin-bottom: 15px;">
                    <i class="fa-solid fa-up-right-from-square"></i> কাজে যান (লিঙ্ক)
                </button>

                <div id="loaderMsg" class="loader">
                    <i class="fa-solid fa-spinner fa-spin"></i> প্রসেসিং...
                </div>

                <button class="submit-btn" id="submitBtn">
                    <i class="fa-solid fa-circle-check"></i> কাজ জমা দিন
                </button>
            </div>
        </main>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user;
        const params = new URLSearchParams(window.location.search);
        
        const tCat = params.get('cat') || "micro";
        const tName = params.get('name') || "General Task";
        const tAmount = params.get('amount') || "0.00";

        document.getElementById('tNameDisplay').innerText = tName;
        document.getElementById('tAmountDisplay').innerText = `৳${tAmount}`;

        // পেজ লোড লজিক
        async function initPage() {
            // ১. যদি ভিডিও বা অ্যাড হয় তবে কার্ড দেখাবে এবং স্ক্রিনশট হাইড করবে
            if (tCat === 'ad' || tCat === 'video') {
                document.getElementById('earningStats').style.display = 'grid';
                document.getElementById('ssUploadSection').style.display = 'none';
                
                // সার্ভার থেকে লিমিট ও পেন্ডিং ডাটা আনা
                const res = await fetch('/api/earn/limit-check', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userId: user.id, type: tCat })
                });
                const data = await res.json();
                document.getElementById('limitDisplay').innerText = `${data.count}/${data.limit}`;
                document.getElementById('pendingDisplay').innerText = `৳${data.pending}`;
            } else {
                // ২. মাইক্রো টাস্ক বা অন্য কিছু হলে স্ক্রিনশট দেখাবে
                document.getElementById('ssUploadSection').style.display = 'block';
                document.getElementById('earningStats').style.display = 'none';
            }
        }

        // ইমেজ প্রিভিউ
        function previewImg() {
            const file = document.getElementById('screenshotInput').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById('imagePreview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('goLinkBtn').onclick = () => tg.openLink('https://t.me/EarnBD_Pro');

        // সাবমিট বাটন লজিক
        document.getElementById('submitBtn').onclick = async () => {
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loaderMsg');
            
            btn.disabled = true;
            loader.style.display = 'block';
            btn.innerText = "অপেক্ষা করুন...";

            let finalProofUrl = "Auto Submit (No SS Required)";

            try {
                // ১. যদি মাইক্রো টাস্ক হয় তবে আগে ইমেজে আপলোড করবে
                if (tCat !== 'ad' && tCat !== 'video') {
                    const fileInput = document.getElementById('screenshotInput');
                    if (fileInput.files.length === 0) {
                        loader.style.display = 'none';
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fa-solid fa-circle-check"></i> কাজ জমা দিন';
                        return tg.showAlert("অনুগ্রহ করে একটি স্ক্রিনশট দিন!");
                    }

                    const formData = new FormData();
                    formData.append("image", fileInput.files[0]);
                    const imgRes = await fetch("https://api.imgbb.com/1/upload?key=7246bc1a891878821a0140bd7686bdf9", {
                        method: "POST",
                        body: formData
                    });
                    const imgData = await imgRes.json();
                    finalProofUrl = imgData.data.url;
                }

                // ২. সার্ভারে টাস্ক সাবমিট
                const res = await fetch('/api/tasks/submit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userId: user.id,
                        taskName: tName,
                        amount: tAmount,
                        category: tCat,
                        proofUrl: finalProofUrl
                    })
                });

                // ৩. যদি ভিডিও বা অ্যাড হয় তবে কাউন্ট বাড়ানো
                if (tCat === 'ad' || tCat === 'video') {
                    await fetch('/api/earn/increment', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ userId: user.id, type: tCat })
                    });
                }

                const result = await res.json();
                tg.showAlert(result.message);
                
                // পেজ রিফ্রেশ বা ব্যাক করা যাতে কার্ড আপডেট হয়
                if (tCat === 'ad' || tCat === 'video') {
                    location.reload(); 
                } else {
                    window.location.href = 'page7.html';
                }

            } catch (err) {
                tg.showAlert("দুঃখিত, আবার চেষ্টা করুন।");
                btn.disabled = false;
                loader.style.display = 'none';
            }
        };

        initPage();
    </script>
</body>
                    </html>
