<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - Make Your Self</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="page3dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: #f4f7ff;">
    <header class="header-region" style="padding: 15px; color: white; display: flex; align-items: center; gap: 15px;">
        <i class="fa-solid fa-arrow-left" onclick="history.back()" style="cursor: pointer;"></i>
        <!-- ডাইনামিক হেডার টাইটেল -->
        <h2 id="pageHeaderTitle" style="font-size: 18px;">টাস্ক লিস্ট</h2>
    </header>

    <main id="taskList" style="padding: 15px;">
        <div style="text-align: center; color: #777; margin-top: 50px;"><i class="fa-solid fa-spinner fa-spin"></i> লোড হচ্ছে...</div>
    </main>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user;

        // URL থেকে ক্যাটাগরি প্যারামিটার রিড করা
        const params = new URLSearchParams(window.location.search);
        const cat = params.get('cat') || "micro";

        // ক্যাটাগরি অনুযায়ী বাংলা হেডার সেট করা
        const categoryTitles = {
            micro: "মাইক্রো টাস্ক লিস্ট",
            map_review: "গুগল ম্যাপ রিভিউ লিস্ট",
            app_review: "গুগল অ্যাপ রিভিউ লিস্ট",
            account_create: "অ্যাকাউন্ট খুলে ইনকাম লিস্ট"
        };
        document.getElementById('pageHeaderTitle').innerText = categoryTitles[cat] || "টাস্ক লিস্ট";

        async function loadTasks() {
            if (!user) return;
            try {
                // ডাইনামিক ক্যাটাগরি ডাটা এপিআই কল
                const res = await fetch(`/api/admin-tasks/${user.id}/${cat}?t=${Date.now()}`);
                const tasks = await res.json();
                const container = document.getElementById('taskList');
                container.innerHTML = '';
                
                if (tasks.length === 0) {
                    container.innerHTML = `<div style="text-align: center; color: #777; margin-top: 50px;"><p>কোন কাজ অবশিষ্ট নেই।</p></div>`;
                    return;
                }

                tasks.forEach(task => {
                    container.innerHTML += `
                    <div class="q-card" style="margin-bottom: 15px; padding: 15px; text-align: left; display: block; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.04);">
                        <h4 style="color: #14287a; font-size: 15px; font-weight: 700;">${task.title}</h4>
                        <p style="font-size: 13px; color: #666; margin: 8px 0;">পারিশ্রমিক: ৳${task.reward}</p>
                        <button onclick="openSubmit('${task.title}', '${task.reward}')" style="background: #14287a; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer;">কাজটি শুরু করুন</button>
                    </div>`;
                });
            } catch (err) { 
                console.error(err); 
                document.getElementById('taskList').innerHTML = `<p style="text-align:center; color:red; margin-top:50px;">সার্ভার কানেকশন ত্রুটি হয়েছে</p>`;
            }
        }

        function openSubmit(name, reward) {
            window.location.href = `task_submit.html?name=${encodeURIComponent(name.trim())}&amount=${reward}&cat=${cat}`;
        }

        window.onpageshow = function(event) {
            loadTasks();
        };

        loadTasks();
        tg.expand();
    </script>
</body>
</html>
