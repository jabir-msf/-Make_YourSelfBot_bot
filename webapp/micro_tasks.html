<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Tasks - Make Your Self</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="page3dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: #f4f7ff;">
    <header class="header-region" style="padding: 15px; color: white; display: flex; align-items: center; gap: 15px;">
        <i class="fa-solid fa-arrow-left" onclick="history.back()"></i>
        <h2 style="font-size: 18px;">মাইক্রো টাস্ক লিস্ট</h2>
    </header>

    <main id="taskList" style="padding: 15px;">
        <!-- টাস্কগুলো এখানে লোড হবে -->
    </main>

    <script>
        const tg = window.Telegram.WebApp;
        async function loadTasks() {
            const res = await fetch('/api/admin-tasks/micro');
            const tasks = await res.json();
            const container = document.getElementById('taskList');
            
            tasks.forEach(task => {
                container.innerHTML += `
                <div class="q-card" style="margin-bottom: 15px; padding: 15px; text-align: left; display: block;">
                    <h4 style="color: #14287a;">${task.title}</h4>
                    <p style="font-size: 12px; color: #666; margin: 5px 0;">পারিশ্রমিক: ৳${task.reward}</p>
                    <button onclick="openSubmit('${task.title}', '${task.reward}')" style="background: #14287a; color: white; border: none; padding: 5px 15px; border-radius: 5px; font-size: 12px;">কাজটি দেখুন</button>
                </div>`;
            });
        }
        function openSubmit(name, reward) {
            window.location.href = `task_submit.html?name=${encodeURIComponent(name)}&amount=${reward}&cat=micro`;
        }
        loadTasks();
    </script>
</body>
</html>
