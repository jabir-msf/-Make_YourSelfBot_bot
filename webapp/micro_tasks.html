<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Tasks - Make Your Self</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="page3dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: #f4f7ff;">
    <header class="header-region" style="padding: 15px; color: white; display: flex; align-items: center; gap: 15px;">
        <i class="fa-solid fa-arrow-left" onclick="history.back()"></i>
        <h2 style="font-size: 18px;">মাইক্রো টাস্ক লিস্ট</h2>
    </header>

    <main id="taskList" style="padding: 15px;">
        <div id="loadingMsg" style="text-align: center; color: #777; margin-top: 50px;">
            <i class="fa-solid fa-spinner fa-spin"></i> টাস্ক লোড হচ্ছে...
        </div>
    </main>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user;

        async function loadTasks() {
            if (!user) {
                document.getElementById('taskList').innerHTML = "User not found!";
                return;
            }

            try {
                // আপডেট লিঙ্ক: ক্যাটাগরি 'micro' এবং ইউজারের আইডি পাঠানো হয়েছে
                const res = await fetch('/api/admin-tasks/' + user.id + '/micro');
                const tasks = await res.json();
                
                const container = document.getElementById('taskList');
                container.innerHTML = ''; // লোডিং মেসেজ মুছে ফেলবে
                
                if (tasks.length === 0) {
                    container.innerHTML = `<div style="text-align: center; color: #777; margin-top: 50px;">
                        <p>বর্তমানে কোন মাইক্রো টাস্ক নেই।</p></div>`;
                    return;
                }

                tasks.forEach(task => {
                    container.innerHTML += `
                    <div class="q-card" style="margin-bottom: 15px; padding: 15px; text-align: left; display: block; border-radius: 12px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                        <h4 style="color: #14287a; font-size: 16px;">${task.title}</h4>
                        <p style="font-size: 13px; color: #666; margin: 8px 0;">পারিশ্রমিক: <b style="color: #2ecc71;">৳${task.reward}</b></p>
                        <button onclick="openSubmit('${task.title}', '${task.reward}')" style="background: #14287a; color: white; border: none; padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: bold; width: 100%; cursor: pointer;">কাজটি শুরু করুন</button>
                    </div>`;
                });
            } catch (err) {
                console.error(err);
                document.getElementById('taskList').innerHTML = "তথ্য লোড করতে সমস্যা হয়েছে।";
            }
        }

        function openSubmit(name, reward) {
            window.location.href = `task_submit.html?name=${encodeURIComponent(name)}&amount=${reward}&cat=micro`;
        }

        loadTasks();
        tg.expand();
        // ইউজার যখনই এই পেজে আসবে, তখনই লোড হবে (Back Button দিয়ে আসলেও)
window.onpageshow = function(event) {
    loadTasks();
};
    </script>
</body>
    </html>
