<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Tasks - Make Your Self</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="page3dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: #f4f7ff;">
    <header class="header-region" style="padding: 15px; color: white; display: flex; align-items: center; gap: 15px;">
        <i class="fa-solid fa-arrow-left" onclick="history.back()"></i>
        <h2 style="font-size: 18px;">মাইক্রো টাস্ক লিস্ট</h2>
    </header>

    <main id="taskList" style="padding: 15px;">
        <div style="text-align: center; color: #777; margin-top: 50px;"><i class="fa-solid fa-spinner fa-spin"></i> লোড হচ্ছে...</div>
    </main>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user;

        async function loadTasks() {
            if (!user) return;
            try {
                // ক্যাশে সমস্যা এড়াতে র্যান্ডম টাইমস্ট্যাম্প (?t=...) যোগ করা হয়েছে
                const res = await fetch(`/api/admin-tasks/${user.id}/micro?t=${Date.now()}`);
                const tasks = await res.json();
                const container = document.getElementById('taskList');
                container.innerHTML = '';
                
                if (tasks.length === 0) {
                    container.innerHTML = `<div style="text-align: center; color: #777; margin-top: 50px;"><p>কোন কাজ অবশিষ্ট নেই।</p></div>`;
                    return;
                }

                tasks.forEach(task => {
                    container.innerHTML += `
                    <div class="q-card" style="margin-bottom: 15px; padding: 15px; text-align: left; display: block; background: white; border-radius: 12px;">
                        <h4 style="color: #14287a;">${task.title}</h4>
                        <p style="font-size: 13px; color: #666; margin: 8px 0;">পারিশ্রমিক: ৳${task.reward}</p>
                        <button onclick="openSubmit('${task.title}', '${task.reward}')" style="background: #14287a; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold;">কাজটি শুরু করুন</button>
                    </div>`;
                });
            } catch (err) { console.error(err); }
        }

        function openSubmit(name, reward) {
            window.location.href = `task_submit.html?name=${encodeURIComponent(name.trim())}&amount=${reward}&cat=micro`;
        }

        // ইউজার ব্যাক বাটনে ক্লিক করে ফিরলে পেজটি অটো রিফ্রেশ হবে
        window.onpageshow = function(event) {
            loadTasks();
        };

        loadTasks();
        tg.expand();
    </script>
</body>
</html>
