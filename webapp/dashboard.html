<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Premium Plans</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Font Awesome Link to support back button arrow -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .p-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; border-top: 5px solid #FFD700; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .price { font-size: 28px; font-weight: bold; color: #1a3fb3; margin: 10px 0; }
        .buy-btn { width: 100%; padding: 12px; background: #1a3fb3; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Back Button Style */
        .back-nav {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            cursor: pointer;
            color: #1a3fb3;
            font-size: 16px;
            font-weight: bold;
            text-align: left;
        }
        .back-nav i {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <!-- Back arrow implementation -->
    <div class="back-nav" onclick="history.back()">
        <i class="fa-solid fa-arrow-left"></i> <span>ফিরে যান</span>
    </div>

    <h2 style="color: #1a3fb3; margin-bottom: 20px;">প্রিমিয়াম মেম্বারশিপ</h2>
    
    <!-- ডাইনামিক এডমিন প্যানেল প্যাকেজ লোডার কন্টেইনার -->
    <div id="packagesContainer">
        <p style="color: #666;">প্যাকেজ লোড হচ্ছে...</p>
    </div>

    <script>
        // ইউজার আইডি পাওয়ার সাধারণ ফাংশন
        function getUserId() {
            let userId = "";
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
                userId = window.Telegram.WebApp.initDataUnsafe.user.id;
            } else {
                const urlParams = new URLSearchParams(window.location.search);
                userId = urlParams.get('userId') || localStorage.getItem('userId') || "12345678";
            }
            return userId;
        }

        async function buy(p, amt) {
            const userId = getUserId();
            if(confirm(`৳${amt} দিয়ে ${p} মেম্বারশিপ কিনবেন?`)) {
                const res = await fetch('/api/buy-premium', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ userId: userId, plan: p, price: amt }) 
                });
                const d = await res.json(); 
                
                if (window.Telegram && window.Telegram.WebApp && typeof window.Telegram.WebApp.showAlert === 'function') {
                    window.Telegram.WebApp.showAlert(d.message);
                } else {
                    alert(d.message);
                }
                
                // প্যাকেজ সফলভাবে কেনার পর তালিকাটি পুনরায় রেন্ডার করা হবে যাতে কেনা প্যাকেজটি হাইড হয়ে যায়
                loadPackages();
            }
        }

        // ডাটাবেস থেকে ডাইনামিকালি প্যাকেজ লিস্ট আনা
        async function loadPackages() {
            try {
                const userId = getUserId();
                
                // ১. ব্যবহারকারীর প্রোফাইল থেকে তার বর্তমান অ্যাক্টিভ মেম্বারশিপ টিয়ারটি আনা হচ্ছে
                let activeTier = "সিলভার";
                try {
                    const userRes = await fetch(`/api/user/${userId}`);
                    const userData = await userRes.json();
                    if (userData && userData.tier) {
                        activeTier = userData.tier;
                    }
                } catch (userErr) {
                    console.error("ব্যবহারকারীর তথ্য লোড করা যায়নি:", userErr);
                }

                // ২. প্যাকেজ সমূহের তালিকা লোড
                const res = await fetch('/api/packages');
                const list = await res.json();
                const container = document.getElementById('packagesContainer');
                container.innerHTML = '';
                
                // ৩. ব্যবহারকারীর বর্তমান সাবস্ক্রাইব করা প্ল্যানটি ফিল্টার আউট করা হচ্ছে
                const availablePackages = list.filter(p => p.name.trim().toLowerCase() !== activeTier.trim().toLowerCase());

                if (availablePackages.length === 0) {
                    container.innerHTML = '<p style="color: #888;">নতুন কোনো প্রিমিয়াম প্ল্যান উপলব্ধ নেই (আপনার বর্তমান প্ল্যানটি সক্রিয় রয়েছে)</p>';
                    return;
                }
                
                availablePackages.forEach(p => {
                    container.innerHTML += `
                    <div class="p-card" style="border-top: 5px solid #FFD700;">
                        <h3>${p.name.toUpperCase()}</h3>
                        <div class="price">৳${p.price}</div>
                        <p>${p.description}</p>
                        <button class="buy-btn" onclick="buy('${p.name}', ${p.price})">কিনুন</button>
                    </div>`;
                });
            } catch (e) {
                console.error(e);
                document.getElementById('packagesContainer').innerHTML = '<p style="color: red;">প্যাকেজ লোড করতে ত্রুটি হয়েছে</p>';
            }
        }

        loadPackages();
    </script>
</body>
</html>
