<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Your Self - Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background:#04092b; color:white; font-family:sans-serif;">
    <div class="main-wrapper" style="max-width:450px; margin:auto; padding:20px;">
        <nav style="display:flex; justify-content:space-between;">
            <h2>Make Your Self</h2>
            <div style="background:rgba(255,255,255,0.1); padding:5px 15px; border-radius:20px;">
                <span id="topBalance">৳০.০০</span>
            </div>
        </nav>
        
        <div style="margin:20px 0;">
            <p>সুপ্রভাত, <span id="userFirstName">User</span>!</p>
            <h1 id="mainBalance" style="font-size:40px; margin:10px 0;">৳০.০০০০</h1>
            <p style="font-size:12px; color:#2ecc71;">● লাইভ মাইনিং চালু আছে</p>
        </div>

        <div class="content-body">
            <!-- ডেইলি বোনাস কাউন্টডাউন -->
            <div id="bonusArea" style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; text-align:center; margin-bottom:15px;">
                <p id="bonusTimer" style="font-size:13px; margin-bottom:10px;">পরবর্তী বোনাস: লোড হচ্ছে...</p>
                <button id="dailyBonusBtn" style="display:none; width:100%; padding:10px; background:#f39c12; border:none; border-radius:10px; color:white; font-weight:bold;">🎁 ডেইলি বোনাস নিন</button>
            </div>

            <!-- মাইনিং ক্লেইম বাটন -->
            <button id="claimBtn" style="width:100%; padding:15px; background:#14287a; color:white; border:none; border-radius:15px; font-weight:bold; margin-bottom:15px;">💰 মাইনিং ক্লেইম করুন</button>

            <!-- কাজ শুরু করুন বাটন -->
            <button onclick="window.location.href='page3dashboard.html'" style="width:100%; padding:15px; background:#2ecc71; color:white; border:none; border-radius:15px; font-weight:bold;">🚀 কাজ শুরু করুন</button>
            
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="window.location.href='page5.html'" style="flex:1; padding:10px; background:rgba(255,255,255,0.1); border:none; color:white; border-radius:10px;">উত্তোলন</button>
                <button onclick="window.location.href='page4.html'" style="flex:1; padding:10px; background:rgba(255,255,255,0.1); border:none; color:white; border-radius:10px;">রেফার</button>
            </div>
        </div>
    </div>
    <script src="dashboard.js"></script>
</body>
    </html>
