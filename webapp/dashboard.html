<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Your Self Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .modal-card { background: white; width: 90%; max-width: 400px; border-radius: 15px; padding: 20px; animation: slideUp 0.3s ease; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .close-modal { background: none; border: none; font-size: 24px; cursor: pointer; }
        .modal-body label { font-size: 13px; font-weight: bold; display: block; margin: 10px 0 5px; }
        .modal-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .modal-btn { width: 100%; padding: 12px; background: #1a3fb3; color: white; border: none; border-radius: 8px; margin-top: 15px; font-weight: bold; cursor: pointer; }
        .info-box { background: #f0f4ff; padding: 10px; border-radius: 8px; font-size: 13px; border-left: 4px solid #1a3fb3; margin-bottom: 10px; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="user-profile-box">
                <div class="avatar-circle"><span id="sideInitial">U</span></div>
                <div class="user-details"><h3 id="sideName">ইউজার</h3><p>Make Your Self</p></div>
            </div>
            <div class="sidebar-balance-card"><div class="b-info"><p>ব্যালেন্স</p><h2 id="sideBalanceDisplay">৳০.০০</h2></div></div>
        </div>
        <div class="menu-items">
            <div class="item" onclick="window.location.href='income.html'"><i class="fa-solid fa-chart-line"></i> ইনকাম রিপোর্ট</div>
            <div class="item" onclick="window.location.href='premium.html'"><i class="fa-solid fa-crown"></i> প্রিমিয়াম কিনুন</div>
        </div>
    </aside>

    <div class="main-wrapper">
        <nav class="top-nav">
            <i class="fa-solid fa-bars menu-trigger" id="menuBtn"></i>
            <h2 class="brand">Make Your Self</h2>
            <div class="nav-actions"><div class="balance-display"><span class="money" id="topBalance">৳০.০০</span></div></div>
        </nav>
        <div class="user-intro"><p>সুপ্রভাত! 👋</p><h1 id="userFirstName">User</h1></div>
        <div class="wallet-card">
            <div class="card-header"><div class="balance-box"><p>মোট ব্যালেন্স</p><h2 id="mainBalance">৳০.০০</h2></div></div>
            <div class="wallet-btns">
                <div class="w-btn" onclick="openAddMoney()"><i class="fa-solid fa-credit-card"></i> <span>অ্যাড</span></div>
                <div class="w-btn" onclick="window.location.href='page5.html'"><i class="fa-solid fa-circle-arrow-down"></i> <span>তোলা</span></div>
                <div class="w-btn" onclick="openRecharge()"><i class="fa-solid fa-mobile-screen"></i> <span>রিচার্জ</span></div>
                <div class="w-btn" onclick="window.location.href='page4.html'"><i class="fa-solid fa-link"></i> <span>রেফার</span></div>
            </div>
        </div>

        <div class="content-body">
            <button onclick="window.location.href='page3dashboard.html'" style="width: 100%; padding: 18px; background: #27ae60; color: white; border: none; border-radius: 15px; font-weight: bold; margin-bottom: 25px;">🚀 কাজ শুরু করুন</button>
            
            <div class="section-wrap">
                <h3 class="section-header">দ্রুত অ্যাকশন</h3>
                <div class="action-grid">
                    <div class="action-box" onclick="window.location.href='page6.html'"><i class="fa-solid fa-file-invoice-dollar t-teal"></i><p>উত্তোলন বিবরণ</p></div>
                    <div class="action-box" onclick="comingSoon()"><i class="fa-solid fa-book-bookmark t-red"></i><p>টিউটোরিয়াল</p></div>
                    <div class="action-box" onclick="window.location.href='income.html'"><i class="fa-solid fa-sack-dollar t-orange"></i><p>আয় সমূহ</p></div>
                    <div class="action-box" onclick="window.location.href='premium.html'"><i class="fa-solid fa-crown t-yellow"></i><p>প্রিমিয়াম</p></div>
                </div>
            </div>

            <div class="section-wrap">
                <h3 class="section-header">যোগাযোগ করুন</h3>
                <div class="action-grid">
                    <div class="action-box" onclick="window.Telegram.WebApp.openTelegramLink('https://t.me/+NDaESCJEtiowN2Rl')"><i class="fa-solid fa-users-viewfinder t-blue"></i><p>গ্রুপ</p></div>
                    <div class="action-box" onclick="window.Telegram.WebApp.openTelegramLink('https://facebook.com/allaquariumyt')"><i class="fa-solid fa-book t-darkblue"></i><p>ফেসবুক</p></div>
                    <div class="action-box" onclick="window.Telegram.WebApp.openTelegramLink('https://t.me/Make_YourSelfBot_bot')"><i class="fa-solid fa-paper-plane t-sky"></i><p>চ্যানেল</p></div>
                    <div class="action-box" onclick="showAdmins()"><i class="fa-solid fa-headset t-blue"></i><p>এডমিনস</p></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="actionModal"><div class="modal-card"><div class="modal-header"><h3 id="modalTitle"></h3><button class="close-modal" onclick="closeModal()">&times;</button></div><div id="modalBody"></div></div></div>
    <script src="dashboard.js"></script>
</body>
    </html>
