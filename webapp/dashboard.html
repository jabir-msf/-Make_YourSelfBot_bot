
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Your Self Dashboard</title>
    
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="main-wrapper">
        <!-- উপরের স্ট্যাটাস বারটি রিমুভ করা হয়েছে সরাসরি নেভিবার থেকে শুরু হচ্ছে -->

        <!-- Navbar -->
        <nav class="top-nav">
            <i class="fa-solid fa-bars menu-trigger"></i>
            <h2 class="brand">Make Your Self</h2>
            <div class="nav-actions">
                <div class="balance-display">
                    <span class="label">ব্যালেন্স</span>
                    <span class="money" id="topBalance">৳০.০০</span>
                </div>
                <div class="notif-bell">
                    <i class="fa-solid fa-bell"></i>
                    <span class="dot"></span>
                </div>
            </div>
        </nav>

        <!-- User Info -->
        <div class="user-intro">
            <p>সুপ্রভাত! 👋</p>
            <h1 id="userFirstName">User</h1>
        </div>

        <!-- Blue Wallet Card -->
        <div class="wallet-card">
            <div class="card-header">
                <div class="balance-box">
                    <p>মোট ব্যালেন্স</p>
                    <h2 id="mainBalance">৳০.০০০০</h2>
                    <div class="live-tag"><span class="blink"></span> লাইভ</div>
                </div>
                <div class="card-badges">
                    <span class="badge silver"><i class="fa-solid fa-medal"></i> সিলভার •</span>
                    <span class="badge active">✅ একটিভ</span>
                </div>
            </div>
            <div class="wallet-btns">
                <div class="w-btn"><i class="fa-solid fa-credit-card c-yellow"></i> <span>অ্যাড</span></div>
                <div class="w-btn" onclick="window.location.href='page5.html'"><i class="fa-solid fa-circle-arrow-down c-green"></i> <span>তোলা</span></div>
                <div class="w-btn"><i class="fa-solid fa-box-archive c-orange"></i> <span>পাঠান</span></div>
                <div class="w-btn" onclick="window.location.href='page4.html'"><i class="fa-solid fa-link c-blue"></i> <span>রেফার</span></div>
            </div>
        </div>

        <!-- Status Row -->
        <div class="status-info">
            <span>✅ ভেরিফাইড</span>
            <span>🔒 নিরাপদ</span>
            <span>⚡ ২৪/৭ সাপোর্ট</span>
        </div>

        <!-- White Content Area -->
        <div class="content-body">
            
            <!-- কাজ শুরু করুন বাটন -->
            <div style="text-align: center; margin-bottom: 25px;">
                <button onclick="window.location.href='page3dashboard.html'" style="width: 100%; padding: 18px; background: linear-gradient(90deg, #2ecc71, #27ae60); color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);">
                    🚀 কাজ শুরু করুন
                </button>
            </div>

            <!-- দ্রুত অ্যাকশন সেকশন (উত্তোলন ও ডিপোজিট রিমুভড) -->
            <div class="section-wrap">
                <h3 class="section-header">দ্রুত অ্যাকশন</h3>
                <div class="action-grid">
                    <div class="action-box">
                        <i class="fa-solid fa-inbox t-brown"></i>
                        <p>সেন্ড মানি</p>
                    </div>
                    <div class="action-box">
                        <i class="fa-solid fa-book-bookmark t-red"></i>
                        <p>টিউটোরিয়াল</p>
                    </div>
                </div>
            </div>

            <!-- যোগাযোগ সেকশন (ইউটিউব ও ইনকাম রিভিউ রিমুভড, এডমিনস এডেড) -->
            <div class="section-wrap">
                <h3 class="section-header">যোগাযোগ করুন</h3>
                <div class="action-grid">
                    <div class="action-box">
                        <i class="fa-solid fa-book t-darkblue"></i>
                        <p>ফেসবুক</p>
                    </div>
                    <div class="action-box">
                        <i class="fa-solid fa-paper-plane t-sky"></i>
                        <p>টেলিগ্রাম</p>
                    </div>
                    <div class="action-box">
                        <i class="fa-solid fa-headset t-blue"></i>
                        <p>এডমিনস</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
    </html>
