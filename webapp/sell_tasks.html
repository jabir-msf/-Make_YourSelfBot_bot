<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Tasks - Make Your Self</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="page5.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 4px solid #1a3fb3; }
        .stat-card h2 { font-size: 20px; color: #1a3fb3; margin-top: 5px; }
        .stat-card p { font-size: 11px; color: #777; font-weight: 600; }
        .toggle-container { display: flex; background: #e0e7ff; border-radius: 12px; padding: 5px; margin-bottom: 20px; }
        .toggle-btn { flex: 1; padding: 10px; text-align: center; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px; transition: 0.3s; }
        .toggle-btn.active { background: #1a3fb3; color: white; }
        .password-box { background: #fff9e6; border: 1px dashed #ffa000; padding: 12px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
        .loader { display: none; color: #1a3fb3; font-weight: bold; margin-bottom: 10px; text-align: center;}
    </style>
</head>
<body style="background: #f4f7ff;">
    <div class="app-container">
        <header class="page-header">
            <button class="back-btn" onclick="history.back()"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="header-title" id="pageTitle">Selling Task</div>
        </header>

        <main class="content">
            <!-- Stats -->
            <div class="stats-container">
                <div class="stat-card">
                    <p>সফল সেল</p>
                    <h2 id="totalSold">০</h2>
                </div>
                <div class="stat-card">
                    <p>মোট আয়</p>
                    <h2 id="totalEarned">৳০.০০</h2>
                </div>
            </div>

            <!-- New/Used Switch -->
            <div class="toggle-container">
                <div class="toggle-btn active" id="btnNew" onclick="switchTab('new')">New Account</div>
                <div class="toggle-btn" id="btnUsed" onclick="switchTab('used')">Used Account</div>
            </div>

            <!-- New Section -->
            <div id="tabNew">
                <div class="password-box">
                    <p style="font-size: 12px; color: #856404; margin-bottom: 5px;">আজকের পাসওয়ার্ড (অবশ্যই এটি দিবেন)</p>
                    <h3 id="dailyPassword" style="font-size: 20px; color: #d35400;">Loading...</h3>
                </div>
                <div class="form-card">
                    <label><i class="fa-solid fa-file-invoice"></i> শীট বা স্ক্রিনশট প্রমাণ দিন:</label>
                    <input type="file" id="sheetFile" style="margin: 15px 0; width: 100%;">
                    <div id="newLoader" class="loader"><i class="fa-solid fa-spinner fa-spin"></i> আপলোড হচ্ছে...</div>
                    <button class="submit-btn" onclick="submitSheet()">✅ প্রমাণ জমা দিন</button>
                </div>
            </div>

            <!-- Used Section -->
            <div id="tabUsed" style="display: none;">
                <div class="form-card">
                    <div class="input-group">
                        <label>আইডি / ইমেইল</label>
                        <input type="text" id="usedEmail" placeholder="example@gmail.com">
                    </div>
                    <div class="input-group">
                        <label>পাসওয়ার্ড</label>
                        <input type="text" id="usedPass" placeholder="******">
                    </div>
                    <button class="submit-btn" onclick="submitManual()" id="manualBtn">✅ জমা দিন</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user;
        const params = new URLSearchParams(window.location.search);
        const cat = params.get('cat') || "gmail_sell";

        document.getElementById('pageTitle').innerText = cat.replace('_', ' ').toUpperCase();

        async function loadData() {
            try {
                // ১. Stats Load
                const statRes = await fetch(`/api/user-stats/${user.id}/${cat}`);
                const stats = await statRes.json();
                document.getElementById('totalSold').innerText = stats.totalSold || 0;
                document.getElementById('totalEarned').innerText = `৳${(stats.totalEarned || 0)}`;

                // ২. Password & Task Load (UserId সহ যাতে এক কাজ একবার লজিক কাজ করে)
                const taskRes = await fetch(`/api/admin-tasks/${user.id}/${cat}`);
                const tasks = await taskRes.json();
                
                const passDisplay = document.getElementById('dailyPassword');
                if(tasks && tasks.length > 0) {
                    passDisplay.innerText = tasks[0].daily_password || "পাসওয়ার্ড নেই";
                } else {
                    passDisplay.innerText = "নতুন কোন কাজ নেই";
                    // টাস্ক না থাকলে বাটন ডিজেবল রাখা ভালো
                    document.querySelector("#tabNew .submit-btn").disabled = true;
                    document.getElementById('manualBtn').disabled = true;
                }
            } catch(e) { 
                console.error(e); 
                document.getElementById('dailyPassword').innerText = "ত্রুটি হয়েছে!";
            }
        }

        function switchTab(type) {
            document.getElementById('tabNew').style.display = type === 'new' ? 'block' : 'none';
            document.getElementById('tabUsed').style.display = type === 'used' ? 'block' : 'none';
            document.getElementById('btnNew').classList.toggle('active', type === 'new');
            document.getElementById('btnUsed').classList.toggle('active', type === 'used');
        }

        // Upload Sheet/Image Proof
        async function submitSheet() {
            const fileInput = document.getElementById('sheetFile');
            if(fileInput.files.length === 0) return tg.showAlert("ফাইল সিলেক্ট করুন!");
            
            const btn = document.querySelector("#tabNew .submit-btn");
            const loader = document.getElementById('newLoader');
            btn.disabled = true;
            loader.style.display = 'block';

            try {
                const formData = new FormData();
                formData.append("image", fileInput.files[0]);

                const imgRes = await fetch("https://api.imgbb.com/1/upload?key=7246bc1a891878821a0140bd7686bdf9", {
                    method: "POST",
                    body: formData
                });
                const imgData = await imgRes.json();
                if(!imgData.success) throw new Error();

                const res = await fetch('/api/tasks/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: user.id,
                        taskName: `New ${cat.toUpperCase()} Sale`,
                        amount: 10.00,
                        category: cat,
                        proofUrl: imgData.data.url
                    })
                });
                const result = await res.json();
                tg.showAlert(result.message);
                if(result.success) location.reload();
            } catch (err) {
                tg.showAlert("আবার চেষ্টা করুন!");
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }

        // Manual Data Submit
        async function submitManual() {
            const email = document.getElementById('usedEmail').value;
            const pass = document.getElementById('usedPass').value;
            if(!email || !pass) return tg.showAlert("সবগুলো পূরণ করুন!");

            const btn = document.getElementById('manualBtn');
            btn.disabled = true;

            const res = await fetch('/api/tasks/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: user.id,
                    taskName: `Used ${cat.toUpperCase()} Sale`,
                    amount: 5.00,
                    category: cat,
                    proofUrl: `ID: ${email} | Pass: ${pass}`
                })
            });
            const result = await res.json();
            tg.showAlert(result.message);
            if(result.success) location.reload();
            else btn.disabled = false;
        }

        loadData();
    </script>
</body>
                    </html>
