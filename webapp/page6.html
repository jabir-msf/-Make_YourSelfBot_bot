<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal History - Make Your Self</title>
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="stylesheet" href="page6.css">
    <!-- Google Fonts for Bengali -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <!-- Top Sticky Header -->
        <header class="header">
            <button class="back-btn" onclick="history.back()">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="header-content">
                <i class="fa-solid fa-clock-rotate-left header-icon"></i>
                <span class="header-title">উত্তোলন ইতিহাস</span>
            </div>
        </header>

        <!-- এই কন্টেইনারে ডাটাবেস থেকে আসা লিস্টটি দেখাবে -->
        <main class="history-list" id="historyContainer">
            <div style="text-align: center; color: #777; margin-top: 50px;">
                <i class="fa-solid fa-spinner fa-spin"></i> তথ্য লোড হচ্ছে...
            </div>
        </main>
    </div>

    <!-- জাভাস্ক্রিপ্ট ফাইল কানেক্ট করা হলো -->
    <script src="page6.js"></script>
</body>
    </html>
